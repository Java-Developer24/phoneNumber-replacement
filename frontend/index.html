<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number Replacer AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        .image-box {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }
        .image-box img {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #eee;
        }
        .error {
            color: #e74c3c;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        #loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phone Number Replacer AI</h1>
    <form id="uploadForm">
        <div class="form-group">
            <label for="image">Upload Image (Max 5MB):</label>
            <input type="file" id="image" accept="image/*" required>
        </div>
        <div class="form-group">
            <label for="replacementNumber">Replacement Phone Number:</label>
            <input type="text" id="replacementNumber" placeholder="e.g. 1-800-555-0199" required>
        </div>
        <button type="submit" id="submitBtn">Process Image</button>
    </form>

    <div id="loading">Processing image... This may take a minute.</div>
    <div id="errorMessage" class="error"></div>

    <div class="results" id="results" style="display: none;">
        <div class="image-box">
            <h3>Original Image</h3>
            <img id="originalImg" src="" alt="Original Image">
        </div>
        <div class="image-box">
            <h3>Processed Image</h3>
            <img id="processedImg" src="" alt="Processed Image">
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const imageInput = document.getElementById('image');
    const replacementInput = document.getElementById('replacementNumber');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const errorMessage = document.getElementById('errorMessage');
    const results = document.getElementById('results');
    const originalImg = document.getElementById('originalImg');
    const processedImg = document.getElementById('processedImg');

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            originalImg.src = URL.createObjectURL(file);
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const file = imageInput.files[0];
        const repNumber = replacementInput.value;

        if (!file || !repNumber) return;

        // Reset state
        errorMessage.textContent = '';
        results.style.display = 'flex';
        processedImg.src = ''; // clear old result
        loading.style.display = 'block';
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);
        formData.append('replacement_number', repNumber);

        try {
            const response = await fetch('/process-image', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error || 'Failed to process image');
            }

            // Backend returns image blob directly
            const blob = await response.blob();
            processedImg.src = URL.createObjectURL(blob);

        } catch (err) {
            errorMessage.textContent = err.message;
            results.style.display = 'none';
        } finally {
            loading.style.display = 'none';
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
